<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>스피또 1000</title>

  <!-- 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- 스타일 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!--
  ============================================================
  스피또 1000 — 마크업
  레이어 구성
    1. FX 레이어 / 커스텀 커서 (전역 오버레이)
    2. HUD       — 잔액 · 충전 · 통계 · 소리
    3. 티켓      — 행운숫자 + 나의 숫자 6칸 + 시리얼
    4. 컨트롤    — 브러시 크기 · 전부 벗기기 · 다시 긁기
    5. 모달      — 구매 / 충전 / 통계 / 결과
  ============================================================
-->

<!-- 1. FX / 커서 -->
<div id="fxLayer" aria-hidden="true"></div>
<div id="scratchCursor" aria-hidden="true"></div>

<div class="page">

  <!-- 2. HUD -->
  <header class="hud">
    <div class="hud-balance">
      <span>잔액</span>
      <strong id="hudBalance">10,000원</strong>
    </div>
    <div class="hud-right">
      <button id="btnRecharge" class="hud-stats-btn" type="button">충전</button>
      <button id="btnStats"    class="hud-stats-btn" type="button">통계</button>
      <label class="hud-audio">
        <input type="checkbox" id="audioToggle" checked />
        소리
      </label>
    </div>
  </header>

  <!-- 3. 복권 티켓 -->
  <div id="ticketWrap" class="ticket-wrap">
    <div class="ticket">

      <!-- 헤더 (상품명 / 최고 당첨금) -->
      <div class="ticket-head">
        <div class="ticket-head-name">스피또 1000</div>
        <div class="ticket-head-prize">최고 당첨금 5억원</div>
      </div>

      <div class="ticket-divider"></div>

      <!-- 게임 본체: 행운숫자 + 나의 숫자 -->
      <div class="ticket-body">

        <!-- 행운숫자 (1칸) -->
        <div class="lucky-panel" style="position:relative;">
          <span class="lucky-label">행운숫자</span>
          <span id="luckyDisplay" class="lucky-number">?</span>
          <span id="luckyKorean"  class="lucky-korean">?</span>
          <canvas id="canvasLucky"
                  style="position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:20;cursor:crosshair;border-radius:12px;"
                  aria-label="행운숫자 스크래치"></canvas>
        </div>

        <!-- 나의 숫자 (6칸) -->
        <div class="cells-panel" style="position:relative;">
          <div class="cells-label">나의 숫자</div>
          <div id="cellsGrid" class="cells-grid"></div>
          <canvas id="canvasGame"
                  style="position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:20;cursor:crosshair;border-radius:8px;"
                  aria-label="나의숫자 스크래치"></canvas>
        </div>

      </div>

      <!-- 푸터 (시리얼 번호) -->
      <div class="ticket-foot">
        <div id="serialNo" class="ticket-foot-serial">00000-0000-000</div>
      </div>

    </div>
  </div>

  <!-- 4. 컨트롤 -->
  <div class="controls">
    <div class="size-row">
      <span class="size-label">크기</span>
      <input type="range" id="brushSize" min="16" max="80" value="38" class="size-slider" />
      <span id="brushVal" class="size-val">38</span>
    </div>
    <div class="action-row">
      <button id="btnReveal" class="btn-reveal">전부 벗기기</button>
      <button id="btnAgain"  class="btn-again" disabled>다시 긁기</button>
    </div>
    <div class="ctrl-hint">게임 영역을 70% 이상 긁으면 자동으로 결과가 나옵니다</div>
  </div>

</div>


<!-- ===== 5. 모달들 ============================================== -->

<!-- 5-1. 구매 모달 (시작 화면) -->
<div id="startOverlay" class="modal-backdrop">
  <div class="buy-modal-card">
    <div class="buy-modal-sub">즉석식복권</div>
    <div class="buy-modal-name">스피또 1000</div>
    <div class="buy-modal-price">₩1,000</div>
    <div class="buy-modal-desc">행운숫자와 나의 숫자가 같으면 당첨</div>
    <div class="buy-modal-balance">
      <span class="buy-modal-balance-label">보유 잔액</span>
      <span id="startBalance" class="buy-modal-balance-val">10,000원</span>
    </div>
    <button id="btnBuy" class="btn-buy">티켓 구매</button>
    <div id="buyHint" class="buy-hint" style="display:none;">잔액이 부족합니다</div>
  </div>
</div>

<!-- 5-2. 충전 모달 (HUD 충전 버튼) -->
<div id="rechargeModal" class="modal-backdrop" style="display:none;">
  <div class="modal-card">
    <div class="modal-title">잔액 충전</div>
    <div class="recharge-balance">
      <span>현재 잔액</span>
      <strong id="rechargeBalance">0원</strong>
    </div>
    <div class="recharge-grid">
      <button class="recharge-btn" data-amt="5000"   type="button">+ ₩5,000</button>
      <button class="recharge-btn" data-amt="10000"  type="button">+ ₩10,000</button>
      <button class="recharge-btn" data-amt="50000"  type="button">+ ₩50,000</button>
      <button class="recharge-btn" data-amt="100000" type="button">+ ₩100,000</button>
    </div>
    <button id="btnRechargeClose" class="modal-close-btn" type="button">닫기</button>
  </div>
</div>

<!-- 5-3. 통계 모달 (HUD 통계 버튼) -->
<div id="statsModal" class="modal-backdrop" style="display:none;">
  <div class="stats-card">
    <div class="modal-title">통계</div>

    <!-- 일일 한도 영역 -->
    <div class="daily-section">
      <div class="daily-row">
        <span class="daily-label">오늘 사용액</span>
        <span id="dailySpentVal" class="daily-val">0원</span>
      </div>
      <div class="daily-row">
        <span class="daily-label">일일 한도</span>
        <span class="daily-val">
          <span id="dailyLimitVal">없음</span>
          <button id="btnEditLimit" class="link-btn" type="button">변경</button>
        </span>
      </div>
      <div id="dailyBar" class="daily-bar" style="display:none;">
        <div id="dailyBarFill" class="daily-bar-fill" style="width:0%;"></div>
      </div>
    </div>

    <!-- 누적 통계 -->
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">총 구매</div>   <div id="statCount"  class="stat-val">0</div></div>
      <div class="stat"><div class="stat-label">당첨률</div>   <div id="statRate"   class="stat-val">0%</div></div>
      <div class="stat"><div class="stat-label">총 사용액</div><div id="statCost"   class="stat-val">0원</div></div>
      <div class="stat"><div class="stat-label">총 당첨금</div><div id="statWin"    class="stat-val">0원</div></div>
      <div class="stat"><div class="stat-label">손익</div>     <div id="statProfit" class="stat-val">0원</div></div>
      <div class="stat"><div class="stat-label">최고 당첨</div><div id="statMax"    class="stat-val">0원</div></div>
    </div>

    <!-- 최근 기록 -->
    <div class="history-section">
      <div class="history-label">최근 기록 (최대 100개)</div>
      <div id="historyList" class="history-list"></div>
    </div>

    <div class="stats-actions">
      <button id="btnResetStats" class="btn-reveal" type="button">기록 초기화</button>
      <button id="btnStatsClose" class="btn-again"  type="button" style="opacity:1;pointer-events:auto;">닫기</button>
    </div>
  </div>
</div>

<!-- 5-4. 결과 모달 (당첨 / 꽝) -->
<div id="resultModal" class="modal-backdrop" style="display:none;">
  <div class="modal-card">
    <div id="confettiHost" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:16px;"></div>
    <div id="resultTitle" class="modal-title">결과</div>
    <div id="resultBody"  class="modal-body"></div>
    <button id="btnModalClose" class="modal-close-btn">확인</button>
  </div>
</div>

<!-- 스크립트 -->
<script src="app.js"></script>
</body>
</html>
